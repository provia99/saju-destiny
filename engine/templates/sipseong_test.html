<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>최원석님의 십성 균형(Sipseong Balance)</title>
    <style>

@font-face { font-family: 'Noto Sans KR'; src: url('file:///C:/Users/provi/Desktop/banya_web/fonts/NotoSansKR-Regular.ttf') format('truetype'); font-weight: 400; }

@font-face { font-family: 'Noto Sans KR'; src: url('file:///C:/Users/provi/Desktop/banya_web/fonts/NotoSansKR-Black.ttf') format('truetype'); font-weight: 900; }
@font-face { font-family: 'Noto Serif KR'; src: url('file:///C:/Users/provi/Desktop/banya_web/fonts/NotoSerifKR-Regular.otf') format('opentype'); font-weight: 400; }
@font-face { font-family: 'Noto Serif KR'; src: url('file:///C:/Users/provi/Desktop/banya_web/fonts/NotoSerifKR-Bold.otf') format('opentype'); font-weight: 700; }
@font-face { font-family: 'Noto Serif KR'; src: url('file:///C:/Users/provi/Desktop/banya_web/fonts/NotoSerifKR-Black.otf') format('opentype'); font-weight: 900; }
@font-face { font-family: 'Noto Sans TC'; src: url('file:///C:/Users/provi/Desktop/banya_web/fonts/NotoSansTC-Regular.ttf') format('truetype'); font-weight: 400; }
@font-face { font-family: 'Noto Sans TC'; src: url('file:///C:/Users/provi/Desktop/banya_web/fonts/NotoSansTC-Bold.ttf') format('truetype'); font-weight: 700; }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #525659;
            /* Dark gray for print preview feel */
            margin: 0;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* A4 Visual Wrapper */
        .a4-wrapper {
            width: 210mm;
            min-height: 297mm;
            background: white;
            padding: 25mm;
            /* 25mm margins as visual padding */
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            /* Centered physically by flex body */
            box-sizing: border-box;
            position: relative;
        }

        .container {
            width: 100%;
            /* Let it fill the printable area */
            padding: 0;
            box-shadow: none;
            background: transparent;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #333;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: #333;
            border-radius: 2px;
        }

        /* 십성 분석 박스 */
        .ohaeng-analysis-box {
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }

        .ohaeng-table {
            width: 100%;
            border-collapse: collapse;
        }

        .ohaeng-table th,
        .ohaeng-table td {
            border: 1px solid #eee;
            padding: 4px 12px;
            text-align: center;
            font-size: 14px;
        }

        .ohaeng-table th {
            background: #fcfcfc;
            color: #666;
            font-weight: 600;
            border-top: none;
        }

        .ohaeng-table tr:last-child td {
            border-bottom: none;
        }

        .ohaeng-table td:first-child,
        .ohaeng-table th:first-child {
            border-left: none;
        }

        .ohaeng-table td:last-child,
        .ohaeng-table th:last-child {
            border-right: none;
        }

        /* 십성 라벨 */
        .ohaeng-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 120px;
            height: 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 12px;
            color: white;
        }

        /* 십성 컬러 Mapping: Ohaeng style classes reused but re-purposed for Sipseong Logic if needed, or define new ones. 
           Going with distinct colors for Sipseong to differentiate from Ohaeng elements.
        */
        .bigeop {
            background: #4caf50;
        }

        /* 목/Green tone equivalent? Or maybe unique? Let's use standard chart colors if any. */
        .siksang {
            background: #f44336;
        }

        /* 화/Red tone */
        .jaeseong {
            background: #ffb300;
        }

        /* 토/Yellow tone */
        .gwanseong {
            background: #9e9e9e;
        }

        /* 금/Grey tone */
        .inseong {
            background: #2196f3;
        }

        /* 수/Blue tone */

        /* 강도 바 */
        .strength-container {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 4px;
        }

        .strength-bar {
            height: 100%;
            border-radius: 4px;
        }

        /* 요약 문구 */
        .ohaeng-summary {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.6;
            color: #444;
            border-left: 4px solid #333;
        }

        /* --- Profile Card CSS from manseoryeok_test.html --- */
        h1 {
            text-align: center;
            margin: 0;
            color: #333;
            border-bottom: 2px solid #333;
            padding: 8px 12px;
            background: white;
            font-size: 20px;
        }

        /* 헤더 통합 박스 (제목 + 정보) */
        .header-unified-box {
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            margin-bottom: 20px;
        }

        /* 정보 섹션 - 내부 스타일 조정 */
        .info-section {
            display: flex;
            gap: 0;
            background: transparent;
            border: none;
            padding: 0;
        }

        .character-wrapper {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: none;
            border-right: 1px solid #333;
            border-radius: 0;
            padding: 10px;
        }

        .character-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd54f 0%, #ffb300 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            font-size: 50px;
            position: relative;
            overflow: hidden;
        }

        .character-circle::after {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            right: -20%;
            bottom: -20%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.25) 0%, transparent 70%);
        }

        .info-table-container {
            flex: 1;
            border-collapse: collapse;
            width: 100%;
            border: none;
            border-radius: 0;
        }

        .info-table-container td {
            padding: 5px 16px;
            border-bottom: 1px solid #333;
            border-right: 1px solid #333;
            vertical-align: middle;
        }

        .info-table-container td:last-child {
            border-right: none;
        }

        .info-table-container tr:last-child td {
            border-bottom: none;
        }

        .info-cell.label {
            width: 110px;
            font-weight: 600;
            color: #555;
            background: #fafafa;
            text-align: center;
            font-size: 14px;
            border-left: none;
        }

        .info-cell.value {
            background: white;
            color: #333;
            font-size: 14px;
        }

        .info-cell.value.highlight {
            font-weight: 600;
            color: #c9a227;
        }

        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .a4-wrapper {
                width: 100%;
                height: auto;
                box-shadow: none;
                margin: 0;
                padding: 25mm !important;
                /* Force padding to match screen preview */
                border: none;
            }

            @page {
                size: A4 portrait;
                margin: 0;
                /* Let wrapper padding handle margins */
            }
        }
    </style>
</head>

<body>
    <div class="a4-wrapper">
        <div class="container">
            <!-- 프로필 카드 (Cheonmyeong Design Map) -->
            <div class="header-unified-box">
                <h1>최원석님의 십성 균형(Sipseong Balance)</h1>

                <!-- 정보 섹션 -->
                <div class="info-section">
                    <div class="character-wrapper">
                        <div class="character-circle">
                            🐉
                        </div>
                    </div>
                    <table class="info-table-container">
                        <tr>
                            <td class="info-cell label">기본정보</td>
                            <td class="info-cell value" colspan="3">최원석, 남성, 61세<sup>*1</sup></td>
                        </tr>
                        <tr>
                            <td class="info-cell label">일주동물</td>
                            <td class="info-cell value highlight" colspan="3">황금용(黃金龍)<sup>*2</sup></td>
                        </tr>
                        <tr>
                            <td class="info-cell label">양력</td>
                            <td class="info-cell value" colspan="3">1964-01-20 09:30 / 사시(巳時)</td>
                        </tr>
                        <tr>
                            <td class="info-cell label">음력</td>
                            <td class="info-cell value" colspan="3">1963-12-06 09:30 / 사시(巳時)</td>
                        </tr>
                    </table>
                </div>
            </div>

            <div class="ohaeng-analysis-box">
                <table class="ohaeng-table">
                    <thead>
                        <tr>
                            <th>십성(육친)</th>
                            <th>갯수</th>
                            <th>강도(점수)</th>
                            <th>세력 상태</th>
                        </tr>
                    </thead>
                    <tbody id="ohaengBody">
                        <!-- JS Rendering -->
                    </tbody>
                </table>
            </div>

            <div class="ohaeng-summary" id="ohaengSummary">
                최원석님의 사주는 <strong>재성(Wealth)</strong> 영역이 매우 강하며, <strong>비겁(Self)</strong> 영역이 상대적으로 약합니다. 주체성(비겁)을
                보완하는 것이
                도움이 될 수 있습니다.
            </div>

        </div>


        <script>
            // Mock Data for Sipseong (10 Stars)
            let sipseongData = [
                { key: 'bigeop', name: '비견(주체성)', count: 1, score: 10, status: '미약', color: '#4caf50' },
                { key: 'bigeop', name: '겁재(경쟁심)', count: 0, score: 5, status: '없음', color: '#4caf50' },

                { key: 'siksang', name: '식신(창의력)', count: 1, score: 10, status: '미약', color: '#f44336' },
                { key: 'siksang', name: '상관(표현력)', count: 1, score: 10, status: '미약', color: '#f44336' },

                { key: 'jaeseong', name: '편재(확장성)', count: 2, score: 30, status: '안정', color: '#ffb300' },
                { key: 'jaeseong', name: '정재(안정성)', count: 1, score: 15, status: '약함', color: '#ffb300' },

                { key: 'gwanseong', name: '편관(도전성)', count: 0, score: 0, status: '없음', color: '#9e9e9e' },
                { key: 'gwanseong', name: '정관(원칙성)', count: 1, score: 10, status: '미약', color: '#9e9e9e' },

                { key: 'inseong', name: '편인(직관력)', count: 0, score: 0, status: '없음', color: '#2196f3' },
                { key: 'inseong', name: '정인(수용성)', count: 1, score: 10, status: '미약', color: '#2196f3' }
            ];

            function renderOhaeng() { // Reusing function name or renaming to renderSipseong
                const tbody = document.getElementById('ohaengBody');
                let html = '';

                sipseongData.forEach(item => {
                    html += `
                    <tr>
                        <td><span class="ohaeng-label ${item.key}">${item.name}</span></td>
                        <td>${item.count}개</td>
                        <td style="width: 150px;">
                            <div style="display:flex; flex-direction:column; align-items:center; gap:2px;">
                                <span style="font-weight:700; color:#333;">${item.score}점</span>
                                <div class="strength-container">
                                    <div class="strength-bar" style="width: ${item.score}%; background: ${item.color};"></div>
                                </div>
                            </div>
                        </td>
                        <td><span style="color:${item.score >= 40 ? '#d32f2f' : item.score < 20 && item.score > 0 ? '#666' : item.score === 0 ? '#888' : '#333'}"><strong>${item.status}</strong></span></td>
                    </tr>
                `;
                });

                tbody.innerHTML = html;
            }

            renderOhaeng();
        </script>
    </div>
</body>

</html>
