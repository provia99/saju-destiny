        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            /* Revert to Gothic Default */
            background: #525659;
            /* Dark gray for print preview feel */
            margin: 0;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* A4 Visual Wrapper */
        .a4-wrapper {
            width: 210mm;
            min-height: 297mm;
            background: white;
            padding: 25mm;
            /* 25mm margins as visual padding */
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            /* Centered physically by flex body */
            box-sizing: border-box;
            position: relative;
        }

        .container {
            width: 100%;
            padding: 0;
            box-shadow: none;
            background: transparent;
        }

        /* --- Profile Card CSS (Shared) --- */
        h1 {
            text-align: center;
            margin: 0;
            color: #333;
            border-bottom: 2px solid #333;
            padding: 8px 12px;
            background: white;
            font-size: 20px;
            font-weight: 700;
        }

        .header-unified-box {
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            margin-bottom: 20px;
            max-width: 610px;
            /* Match ohaeng_test */
            width: 100%;
            margin-left: auto;
            margin-right: auto;
        }

        .info-section {
            display: flex;
            gap: 0;
            background: transparent;
            border: none;
            padding: 0;
            width: 100%;
        }

        .character-wrapper {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: none;
            border-right: 1px solid #333;
            border-radius: 0;
            padding: 10px;
        }

        .character-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd54f 0%, #ffb300 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            font-size: 50px;
            position: relative;
            overflow: hidden;
        }

        .character-circle::after {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            right: -20%;
            bottom: -20%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.25) 0%, transparent 70%);
        }

        .info-table-container {
            flex: 1;
            border-collapse: collapse;
            width: 100%;
            border: none;
            border-radius: 0;
        }

        .info-table-container td {
            padding: 5px 16px;
            border-bottom: 1px solid #333;
            border-right: 1px solid #333;
            vertical-align: middle;
            font-size: 14px;
        }

        .info-table-container td:last-child {
            border-right: none;
        }

        .info-table-container tr:last-child td {
            border-bottom: none;
        }

        .info-cell.label {
            width: 110px;
            font-weight: 600;
            color: #555;
            background: #fafafa;
            text-align: center;
        }

        .info-cell.value {
            background: white;
            color: #333;
        }

        .info-cell.value.highlight {
            font-weight: 600;
            color: #c9a227;
        }

        .sub-text {
            font-size: 10px;
            font-weight: 400;
            margin-left: 2px;
            opacity: 0.8;
            letter-spacing: -0.5px;
        }


        /* --- Daewoon Table Specific CSS --- */
        .daewoon-box {
            background-color: white;
            border: 2px solid #333;
            border: 2px solid #333;
            border-radius: 12px;
            /* Rounded corners */
            padding: 0;
            padding: 0;
            /* Remove padding for Card style */
            position: relative;
            box-shadow: none;
            min-width: 550px;
            overflow: hidden;
            /* Clip children to rounded corners */
        }

        .daewoon-grid {
            display: grid;
            /* Flexible width columns to fill the container */
            grid-template-columns: 80px repeat(9, 1fr);
            gap: 0;
            /* Remove outer borders, rely on container border */
            border: none;
            align-items: center;
            min-width: 450px;
            justify-content: start;
            position: relative;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            /* Slightly taller for breathing room */
            font-size: 14px;
            font-weight: 500;
            color: #333;
            position: relative;
            z-index: 2;
            border-right: 1px solid #999;
            /* Sharpened from #ddd */
            border-bottom: 1px solid #999;
        }

        /* Explicit class for the last column to prevent off-by-one errors */
        .cell.last-col {
            border-right: none;
        }



        .cell.label {
            justify-content: center;
            /* Center align labels too */
            padding-right: 0;
            font-weight: 600;
            color: #555;
            font-size: 12px;
            background-color: #f9f9f9;
            /* Subtle background for labels */
        }

        /* Year Row (Transparent) */
        .cell.year {
            font-size: 13px;
            color: #666;
            align-items: center;
            /* Center year vertically */
            padding-bottom: 0;
        }

        .cell.year.current {
            font-weight: 800;
            color: #1f77b4;
            /* Blue Highlight */
            font-size: 15px;
        }

        /* Column Highlight (Myeongjo + Blue + Background) */
        .cell.current-col {
            font-family: 'Noto Serif KR', serif;
            color: #1f77b4;
            font-weight: 700;
            background-color: #e6f2ff !important;
            /* Darker Light Blue Background */
        }

        /* Ensure inner box text remains white even in highlighted column */
        .cell.current-col .inner-box {
            color: white !important;
            font-family: 'Noto Serif KR', serif;
        }

        /* Normal White Data Cells */
        .cell.data {
            background-color: white;
            border-radius: 0;
            /* Table style */
            box-shadow: none;
            width: 100%;
        }

        /* Colored Cells (Stems/Branches) */
        /* Colored Cells Container - Now White */
        .cell.colored {
            border-radius: 0;
            background-color: white;
            /* Outer box is white */
            color: #333;
            width: 100%;
            padding: 0;
            /* Let flexbox handle centering */
        }

        /* Inner Box Style (The "Box in a Box") */
        .inner-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 76%;
            height: 70%;
            width: 76%;
            height: 70%;
            width: 76%;
            height: 70%;
            border-radius: 6px;
            /* Rounded badge */
            /* Rounded badge */
            color: white;
            font-weight: 700;
            font-size: 18px;
            /* Larger Hanja */
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
            /* Subtle depth */
        }

        .inner-box .sub-text {
            font-size: 11px;
            /* Balanced Hangul */
            margin-left: 3px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.95);
            /* Clearer white */
            padding-top: 2px;
            /* Slight visual alignment adjustment */
        }

        /* Daewoon Colors */
        /* Vivid Colors */
        .bg-wood {
            background-color: #2ca02c;
        }

        /* Strong Green */
        .bg-water {
            background-color: #1f77b4;
            color: white !important;
        }

        /* Strong Blue */
        .bg-earth-dark {
            background-color: #8c564b;
        }

        /* Strong Brown */
        .bg-earth-brown {
            background-color: #a06a5f;
        }

        /* Slightly Lighter Brown */
        .bg-fire {
            background-color: #d62728;
        }

        /* Strong Red */
        .bg-metal {
            background-color: #7f7f7f;
            color: white !important;
        }

        /* Strong Grey */

        /* Dark text */

        /* Spacing for Visual Grouping */
        /* Spacing for Visual Grouping */
        .spacer-top {
            margin-top: 0;
            border-top: 2px solid #bbb;
            /* Thicker, continuous separation line */
        }



        /* Print Optimization for A4 Portrait */
        @media print {
            body {
                background: white;
                padding: 0;
                margin: 0;
            }

            .a4-wrapper {
                width: 100%;
                height: auto;
                box-shadow: none;
                margin: 0;
                padding: 25mm !important;
                border: none;
            }

            @page {
                size: A4 portrait;
                margin: 0;
            }

            .container {
                width: 100%;
                max-width: none;
                padding: 0;
                margin: 0;
            }

            .daewoon-box {
                box-shadow: none;
                padding: 0;
                /* Match screen Card style */
                min-width: 0;
                width: 100%;
                overflow: hidden;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                border: 2px solid #555;
                /* Visible border in print */
                border-radius: 0;
            }

            .daewoon-grid {
                min-width: 0;
                width: 100%;
                gap: 0;
                border: none;
                /* No outer border, use container */
            }

            .cell {
                box-shadow: none;
                border: none;
                /* Reset individual borders */
                border-right: 1px solid #999;
                border-bottom: 1px solid #999;
                font-size: 9px;
                height: 32px;
            }

            .cell:nth-child(10n) {
                border-right: none;
            }

            .cell.label {
                font-size: 9px;
                padding-right: 5px;
            }

            .cell.year {
                font-size: 9px;
            }

            .cell.year.current {
                font-size: 10px;
            }

            .cell.colored {
                font-size: 10px;
                /* Print override: ensure background prints */
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .inner-box {
                width: 76%;
                height: 75%;
                /* Slightly larger in print for readability */
                border-radius: 4px;
                font-size: 10px;
                box-shadow: none;
            }

            .sub-text {
                font-size: 8px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="a4-wrapper">
        <div class="container">
            <!-- Profile Card -->
            <div class="header-unified-box">
                <h1>최원석님의 대운 (大運) Life Infrastructure</h1>
                <div class="info-section">
                    <div class="character-wrapper">
                        <div class="character-circle">
                            🐉
                        </div>
                    </div>
                    <table class="info-table-container">
                        <tr>
                            <td class="info-cell label">기본정보</td>
                            <td class="info-cell value" colspan="3">최원석, 남성, 61세<sup>*1</sup></td>
                        </tr>
                        <tr>
                            <td class="info-cell label">일주동물</td>
                            <td class="info-cell value highlight" colspan="3">황금용(黃金龍)<sup>*2</sup></td>
                        </tr>
                        <tr>
                            <td class="info-cell label">양력</td>
                            <td class="info-cell value" colspan="3">1964-01-20 09:30 / 사시(巳時)</td>
                        </tr>
                        <tr>
                            <td class="info-cell label">음력</td>
                            <td class="info-cell value" colspan="3">1963-12-06 09:30 / 사시(巳時)</td>
                        </tr>
                    </table>
                </div>
            </div>

            <!-- Daewoon Table -->
            <div class="daewoon-box">
                <div class="daewoon-grid">
                    <!-- Content rendered by JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const daewoonData = [
            {
                "year": 1969, "age": 5,
                "hsSipseong": "편관",
                "stem": "甲", "stemHanja": "목", "stemColor": "bg-wood",
                "branch": "子", "branchHanja": "수", "branchColor": "bg-water",
                "ebSipseong": "정재",
                "unsung": "태", "sinsal": "년살",
                "isCurrent": false
            },
            {
                "year": 1979, "age": 15,
                "hsSipseong": "정재",
                "stem": "癸", "stemHanja": "수", "stemColor": "bg-water",
                "branch": "亥", "branchHanja": "수", "branchColor": "bg-water",
                "ebSipseong": "편재",
                "unsung": "절", "sinsal": "지살",
                "isCurrent": false
            },
            {
                "year": 1989, "age": 25,
                "hsSipseong": "편재",
                "stem": "壬", "stemHanja": "수", "stemColor": "bg-water",
                "branch": "戌", "branchHanja": "토", "branchColor": "bg-earth-dark",
                "ebSipseong": "비견",
                "unsung": "묘", "sinsal": "천살",
                "isCurrent": false
            },
            {
                "year": 1999, "age": 35,
                "hsSipseong": "상관",
                "stem": "辛", "stemHanja": "금", "stemColor": "bg-metal",
                "branch": "酉", "branchHanja": "금", "branchColor": "bg-metal",
                "ebSipseong": "상관",
                "unsung": "사", "sinsal": "재살",
                "isCurrent": false
            },
            {
                "year": 2009, "age": 45,
                "hsSipseong": "식신",
                "stem": "庚", "stemHanja": "금", "stemColor": "bg-metal",
                "branch": "申", "branchHanja": "금", "branchColor": "bg-metal",
                "ebSipseong": "식신",
                "unsung": "병", "sinsal": "겁살",
                "isCurrent": false
            },
            {
                "year": 2019, "age": 55,
                "hsSipseong": "겁재",
                "stem": "己", "stemHanja": "토", "stemColor": "bg-earth-brown",
                "branch": "未", "branchHanja": "토", "branchColor": "bg-earth-brown",
                "ebSipseong": "겁재",
                "unsung": "쇠", "sinsal": "화개살",
                "isCurrent": true
            },
            {
                "year": 2029, "age": 65,
                "hsSipseong": "비견",
                "stem": "戊", "stemHanja": "토", "stemColor": "bg-earth-dark",
                "branch": "午", "branchHanja": "화", "branchColor": "bg-fire",
                "ebSipseong": "정인",
                "unsung": "제왕", "sinsal": "육해살",
                "isCurrent": false
            },
            {
                "year": 2039, "age": 75,
                "hsSipseong": "정인",
                "stem": "丁", "stemHanja": "화", "stemColor": "bg-fire",
                "branch": "巳", "branchHanja": "화", "branchColor": "bg-fire",
                "ebSipseong": "편인",
                "unsung": "건록", "sinsal": "역마살",
                "isCurrent": false
            },
            {
                "year": 2049, "age": 85,
                "hsSipseong": "편인",
                "stem": "丙", "stemHanja": "화", "stemColor": "bg-fire",
                "branch": "辰", "branchHanja": "토", "branchColor": "bg-earth-dark",
                "ebSipseong": "비견",
                "unsung": "관대", "sinsal": "반안살",
                "isCurrent": false
            }
        ];

        function renderDaewoonTable() {
            const grid = document.querySelector('.daewoon-grid');

            // 1. Year Row
            let html = `<div class="cell label">년도</div>`;
            daewoonData.forEach((item, index) => {
                const isLast = index === daewoonData.length - 1 ? 'last-col' : '';
                const isCurrentCol = item.isCurrent ? 'current-col' : '';
                html += `<div class="cell year ${item.isCurrent ? 'current' : ''} ${isCurrentCol} ${isLast}">${item.year}</div>`;
            });

            // 2. Age Row
            html += `<div class="cell label">나이*1</div>`;
            daewoonData.forEach((item, index) => {
                const isLast = index === daewoonData.length - 1 ? 'last-col' : '';
                const isCurrentCol = item.isCurrent ? 'current-col' : '';
                html += `<div class="cell data ${isCurrentCol} ${isLast}">${item.age}</div>`;
            });

            // 3. HS Sipseong (Add Spacer)
            html += `<div class="cell label spacer-top">천간십성</div>`;
            daewoonData.forEach((item, index) => {
                const isLast = index === daewoonData.length - 1 ? 'last-col' : '';
                const isCurrentCol = item.isCurrent ? 'current-col' : '';
                html += `<div class="cell data spacer-top ${isCurrentCol} ${isLast}">${item.hsSipseong}</div>`;
            });

            // 4. Heaven Stem
            html += `<div class="cell label">천간</div>`;
            daewoonData.forEach((item, index) => {
                const isLast = index === daewoonData.length - 1 ? 'last-col' : '';
                const isCurrentCol = item.isCurrent ? 'current-col' : '';
                html += `<div class="cell colored ${isCurrentCol} ${isLast}"><div class="inner-box ${item.stemColor}">${item.stem}</div></div>`;
            });

            // 5. Earth Branch
            html += `<div class="cell label">지지</div>`;
            daewoonData.forEach((item, index) => {
                const isLast = index === daewoonData.length - 1 ? 'last-col' : '';
                const isCurrentCol = item.isCurrent ? 'current-col' : '';
                html += `<div class="cell colored ${isCurrentCol} ${isLast}"><div class="inner-box ${item.branchColor}">${item.branch}</div></div>`;
            });

            // 6. EB Sipseong
            html += `<div class="cell label">지지십성</div>`;
            daewoonData.forEach((item, index) => {
                const isLast = index === daewoonData.length - 1 ? 'last-col' : '';
                const isCurrentCol = item.isCurrent ? 'current-col' : '';
                html += `<div class="cell data ${isCurrentCol} ${isLast}">${item.ebSipseong}</div>`;
            });

            // 7. 12 Unsung (Add Spacer)
            html += `<div class="cell label spacer-top">12운성</div>`;
            daewoonData.forEach((item, index) => {
                const isLast = index === daewoonData.length - 1 ? 'last-col' : '';
                const isCurrentCol = item.isCurrent ? 'current-col' : '';
                html += `<div class="cell data spacer-top ${isCurrentCol} ${isLast}">${item.unsung}</div>`;
            });

            // 8. 12 Sinsal
            html += `<div class="cell label">12신살</div>`;
            daewoonData.forEach((item, index) => {
                const isLast = index === daewoonData.length - 1 ? 'last-col' : '';
                const isCurrentCol = item.isCurrent ? 'current-col' : '';
                html += `<div class="cell data ${isCurrentCol} ${isLast}">${item.sinsal}</div>`;
            });

            // Insert after overlay
            grid.innerHTML = html;
        }

        renderDaewoonTable();
    </script>
</body>

</html>
