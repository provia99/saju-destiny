body { font-family:'NanumBrush','Noto Sans KR',sans-serif; background:white; font-weight:700; }

.saju-table {

  font-size: 11pt;

  margin-bottom: 10px;
}
.saju-table th {

.saju-highlight {
  color: #c9a227 !important;

  justify-content: center;

  font-size: 8pt;
  color: #666;

  border-radius: 12px;
  padding: 3px 10px;
  letter-spacing: 0.3px;
