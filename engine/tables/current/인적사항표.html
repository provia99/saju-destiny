* { margin:0; padding:0; box-sizing:border-box; }
body { background:transparent; font-family:'Noto Sans KR',sans-serif; }
.card {
  width: 604px;
  margin: 0 auto;
  background: linear-gradient(135deg, #fdfcf8 0%, #f8f4e8 100%);
  border: 1.5px solid #d4af37;
  border-radius: 14px;
  padding: 14px 22px;
  display: flex;
  gap: 16px;
  align-items: center;
  max-height: 230px;
  overflow: hidden;
}
.left {
  flex-shrink: 0;
  text-align: center;
  width: 150px;
}
.left .name {
  font-family: 'Noto Serif KR', serif;
  font-size: 15pt;
  font-weight: 700;
  color: #3d3225;
  letter-spacing: 1.5px;
  margin-bottom: 3px;
}
.left .ilju {
  font-family: 'Noto Serif KR', serif;
  font-size: 9pt;
  color: #8a7e5a;
  letter-spacing: 0.5px;
  margin-bottom: 5px;
}
.left .badge {
  display: inline-block;
  font-size: 6.5pt;
  color: #8a7e5a;
  border: 1px solid #d4af3780;
  border-radius: 10px;
  padding: 2px 8px;
  letter-spacing: 0.3px;
  background: #fff;
  white-space: nowrap;
}
.divider {
  width: 1px;
  height: 110px;
  background: linear-gradient(180deg, transparent, #d4af3780, transparent);
  flex-shrink: 0;
}
.right {
  flex: 1;
  min-width: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px 10px;
}
.item {
  display: flex;
  gap: 5px;
  align-items: baseline;
  white-space: nowrap;
  min-width: 0;
}
.item .label {
  font-size: 7pt;
  color: #a09070;
  white-space: nowrap;
  min-width: 32px;
  flex-shrink: 0;
}
.item .value {
  font-family: 'Noto Serif KR', serif;
  font-size: 8pt;
  color: #3d3225;
  font-weight: 500;
  white-space: nowrap;
}
</style>

<body>
<div class="card">
  <div class="left">
    <div class="name">임효원</div>
    <div class="ilju">戊辰(무진)</div>
    <div class="badge">여성 · 원숭이띠 · 만58세 · 묘시</div>
  </div>
  <div class="divider"></div>
  <div class="right">
    <div class="item"><span class="label">양력</span><span class="value">1968년 2월 28일</span></div>
    <div class="item"><span class="label">음력</span><span class="value">1968년 2월 1일</span></div>
    <div class="item"><span class="label">신강약</span><span class="value">중화형신강</span></div>
    <div class="item" style="grid-column:1/-1;"><span class="label">격국</span><span class="value" style="white-space:normal;">편관격(偏官格)</span></div>
    <div class="item"><span class="label">용신</span><span class="value" style="color:#2e7d32;font-weight:700;">木(목)</span></div>
    <div class="item"><span class="label">희신</span><span class="value" style="color:#1565c0;">水(수)</span></div>
    <div class="item"><span class="label">기신</span><span class="value" style="color:#c62828;">土(토)</span></div>
    <div class="item"><span class="label">일간</span><span class="value">戊(무)</span></div>
    <div class="item" style="grid-column:1/-1;"><span class="label">일간오행</span><span class="value" style="color:#a67c00;font-weight:700;">土(토)</span></div>
    <div class="item" style="grid-column:1/-1;margin-top:3px;padding-top:4px;border-top:1px dashed #d4af3740;"><span class="label">오행</span><span class="value" style="font-size:8pt;letter-spacing:0.3px;"><span style="color:#2e7d32;font-weight:700;">木</span> 51% · <span style="color:#c62828;font-weight:700;">火</span> 2% · <span style="color:#a67c00;font-weight:700;">土</span> 42% · <span style="color:#5d4037;font-weight:700;">金</span> 4% · <span style="color:#1565c0;font-weight:700;">水</span> 1%</span></div>
  </div>
</div>
