<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #fff; }
.img-card {
  width: 604px;
  height: 400px;
  margin: 0 auto;
  border: 1px solid #e0d8c8;
  border-radius: 6px;
  overflow: hidden;
  position: relative;
  background: #f9f6f0;
}
.img-area {
  width: 100%;
  height: 300px;
  overflow: hidden;
  position: relative;
}
.img-area img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.caption-area {
  width: 100%;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 12px 32px;
  background: linear-gradient(135deg, #faf8f4 0%, #f0ebe0 100%);
  border-top: 1px solid #e0d8c8;
}
.caption-text {
  font-family: 'Noto Serif KR', 'Georgia', serif;
  font-size: 14px;
  font-weight: 400;
  color: #5a4e3c;
  line-height: 1.8;
  text-align: center;
  letter-spacing: 0.5px;
}
.caption-text .highlight {
  color: #8b6914;
  font-weight: 600;
}
.caption-text .sub {
  display: block;
  font-size: 12px;
  color: #8a7e6c;
  margin-top: 4px;
  font-style: italic;
}
</style>
</head>
<body>
<div class="img-card">
  <div class="img-area">
    <img src="/static/images/small_sailboat.png"
         onerror="this.src='file:///C:/Users/provi/Desktop/banya_web/engine/images/common/small_sailboat.png'"
         alt="돛단배">
  </div>
  <div class="caption-area">
    <div class="caption-text">
      <span class="highlight">바람의 방향을 아는 사람</span>은 돛을 조정해 더 멀리 갈 수 있습니다.
      <span class="sub">사주는 바람의 방향을 알려주는 지혜입니다.</span>
    </div>
  </div>
</div>
</body>
</html>
