<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지지육합조견표</title>
  <style>
    @font-face { font-family:'Noto Sans KR'; src:local('Noto Sans KR'); }
    @font-face { font-family:'Noto Serif KR'; src:local('Noto Serif KR'); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR',sans-serif;
      background: white;
      padding: 10px;
    }
    .page { width:604px; max-height:840px; padding:6px 8px; background:white; overflow:hidden; margin:0 auto; }
    .banner-hdr { display:flex;align-items:center;justify-content:space-between;padding:6px 14px;border-radius:8px;margin-bottom:5px; }
    .banner-hdr-title { font-size:10pt;font-weight:900;color:white; }
    .banner-hdr-info { font-size:7pt;color:rgba(255,255,255,.85); }
    .card { border:1.5px solid #333;border-radius:8px;overflow:hidden; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }
    thead tr {
      background: #f5f5f5;
    }
    th {
      padding: 6px 8px;
      text-align: center;
      font-weight: 600;
      border: 1px solid #ddd;
      font-size: 7pt;
      color: #333;
    }
    td {
      padding: 5px 7px;
      border: 1px solid #e0e0e0;
      font-size: 7pt;
      text-align: center;
    }
    tr:nth-child(even) td {
      background: #fafafa;
    }
    .name-cell {
      font-weight: bold;
      font-size: 9pt;
    }
    .arrow {
      font-size: 11pt;
      font-weight: bold;
      color: #666;
    }
    .og-cell {
      font-weight: bold;
      font-size: 9pt;
    }
    .feature-cell {
      text-align: left;
      font-size: 7pt;
      line-height: 1.4;
    }
    @media print { body{background:white;margin:0;padding:0;} .page{margin:0;box-shadow:none;} @page{size:604px 840px;margin:0;} }
  </style>
</head>
<body>
  <div class="page">
    <div class="banner-hdr" style="background:linear-gradient(135deg,#0d47a1,#1565c0);">
      <div class="banner-hdr-title">📋 지지육합조견표</div>
      <div class="banner-hdr-info">사주명리학 기초 참조표</div>
    </div>
    <div class="card">
    <table>
      <thead>
        <tr>
          <th>합</th>
          <th>지지1</th>
          <th colspan="3">합화</th>
          <th>특성</th>
        </tr>
      </thead>
      <tbody>
        <tr style="background: white;">
          <td class="name-cell" style="border-left: 3px solid #f0d470;">子丑合</td>
          <td>子(자·水)</td>
          <td class="arrow">→</td>
          <td class="og-cell" style="background: #fff8e0; color: #9b6f00; border-left: 3px solid #f0d470;">土</td>
          <td class="feature-cell">상생합: 안정·보수</td>
        </tr>
        <tr style="background: #fafafa;">
          <td class="name-cell" style="border-left: 3px solid #a8dbb5;">寅亥合</td>
          <td>寅(인·木)</td>
          <td class="arrow">→</td>
          <td class="og-cell" style="background: #e8f7ec; color: #1e6b2a; border-left: 3px solid #a8dbb5;">木</td>
          <td class="feature-cell">생합: 성장·출발</td>
        </tr>
        <tr style="background: white;">
          <td class="name-cell" style="border-left: 3px solid #f5a9a5;">卯戌合</td>
          <td>卯(묘·木)</td>
          <td class="arrow">→</td>
          <td class="og-cell" style="background: #fde8e7; color: #b92e27; border-left: 3px solid #f5a9a5;">火</td>
          <td class="feature-cell">화합: 열정·결속</td>
        </tr>
        <tr style="background: #fafafa;">
          <td class="name-cell" style="border-left: 3px solid #b0c4d0;">辰酉合</td>
          <td>辰(진·土)</td>
          <td class="arrow">→</td>
          <td class="og-cell" style="background: #eef1f4; color: #3d4f5c; border-left: 3px solid #b0c4d0;">金</td>
          <td class="feature-cell">금합: 정밀·수확</td>
        </tr>
        <tr style="background: white;">
          <td class="name-cell" style="border-left: 3px solid #90bfe0;">巳申合</td>
          <td>巳(사·火)</td>
          <td class="arrow">→</td>
          <td class="og-cell" style="background: #e3eef9; color: #1a4e7a; border-left: 3px solid #90bfe0;">水</td>
          <td class="feature-cell">수합: 유연·변화</td>
        </tr>
        <tr style="background: #fafafa;">
          <td class="name-cell" style="border-left: 3px solid #f5a9a5;">午未合</td>
          <td>午(오·火)</td>
          <td class="arrow">→</td>
          <td class="og-cell" style="background: #fde8e7; color: #b92e27; border-left: 3px solid #f5a9a5;">火/土</td>
          <td class="feature-cell">토합: 풍요·감성</td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>
</body>
</html>
