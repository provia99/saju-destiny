<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e1433">
<title>비밀번호 찾기 | {{ master.연구소명 or master.선생님이름 }}</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:    #1e1433;
    --bg-card:    #271a45;
    --lav-dark:   #3b2068;
    --lav-mid:    #6d3fa0;
    --lav-main:   #9b59b6;
    --lav-light:  #c084e8;
    --lav-pale:   #e9d5f7;
    --gold:       #f5c842;
    --gold-light: #fde68a;
    --text:       #faf5ff;
    --text-dim:   #d4b8f0;
    --text-muted: #9b82c0;
    --border:     rgba(155,89,182,0.25);
    --border-gold:rgba(245,200,66,0.3);
    --error:      #ff6b6b;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg-deep);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(155,89,182,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(109,63,160,0.12) 0%, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 16px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%; max-width: 420px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px; padding: 40px 32px;
    position: relative; overflow: hidden;
    box-shadow: 0 20px 60px rgba(59,32,104,0.5);
  }
  .card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(192,132,252,0.5), rgba(245,200,66,0.3), transparent);
  }
  .logo { text-align: center; margin-bottom: 28px; }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--lav-dark), var(--lav-mid));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; margin: 0 auto 14px;
    border: 2px solid rgba(192,132,252,0.5);
    box-shadow: 0 0 24px rgba(109,63,160,0.5);
  }
  .logo h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.2rem;
    background: linear-gradient(135deg, var(--lav-pale), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 700;
  }
  .logo p { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
  h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .desc {
    font-size: 0.88rem; color: var(--text-muted);
    margin-bottom: 24px; line-height: 1.6;
  }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 7px; font-weight: 500; }
  input[type="email"] {
    width: 100%; padding: 14px 16px;
    background: var(--bg-deep);
    border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--text);
    font-size: 0.95rem; outline: none;
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="email"]:focus {
    border-color: var(--lav-main);
    box-shadow: 0 0 0 3px rgba(155,89,182,0.2);
  }
  input[type="email"]::placeholder { color: var(--text-muted); }
  .btn-primary {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--lav-mid), var(--lav-dark));
    border: none; border-radius: 14px;
    color: #fff; font-size: 1rem; font-weight: 700;
    cursor: pointer; margin-top: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    box-shadow: 0 8px 24px rgba(109,63,160,0.5);
    transition: all 0.25s;
    position: relative; overflow: hidden;
  }
  .btn-primary::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .alert-error {
    background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3);
    border-radius: 10px; padding: 12px 16px;
    font-size: 0.88rem; color: var(--error); margin-bottom: 16px;
  }
  .alert-success {
    background: rgba(107,255,184,0.08); border: 1px solid rgba(107,255,184,0.25);
    border-radius: 12px; padding: 18px;
    font-size: 0.9rem; color: #6bffb8; margin-bottom: 16px;
    text-align: center; line-height: 1.7;
  }
  .alert-success small { color: var(--text-muted); }
  .links {
    text-align: center; margin-top: 24px;
    font-size: 0.88rem; color: var(--text-muted);
  }
  .links a { color: var(--gold-light); text-decoration: none; transition: color 0.2s; }
  .links a:hover { color: var(--gold); text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">☯</div>
    <h1>{{ master.연구소명 or master.선생님이름 }}</h1>
    <p>비밀번호 찾기</p>
  </div>

  <h2>비밀번호를 잊으셨나요?</h2>
  <p class="desc">가입 시 등록한 이메일 주소를 입력하시면<br>비밀번호 재설정 링크를 보내드립니다.</p>

  {% if error %}
  <div class="alert-error">{{ error }}</div>
  {% endif %}

  {% if success %}
  <div class="alert-success">
    ✅ {{ success }}<br><br>
    이메일을 확인하신 후 링크를 클릭해 주세요.<br>
    <small>스팸함도 확인해 주세요.</small>
  </div>
  {% else %}
  <form method="post">
    <div class="form-group">
      <label for="email">이메일 주소</label>
      <input type="email" id="email" name="email" placeholder="example@email.com" required autofocus>
    </div>
    <button type="submit" class="btn-primary">✦ 재설정 링크 발송</button>
  </form>
  {% endif %}

  <div class="links">
    <a href="{{ base_url }}/login">← 로그인으로 돌아가기</a>
  </div>
</div>
</body>
</html>
