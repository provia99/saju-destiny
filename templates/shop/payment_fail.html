<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 실패 - 반야 쇼핑몰</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: linear-gradient(135deg, #1a3a6a, #2c5aa0); color: white; padding: 20px; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        .container { max-width: 600px; margin: 60px auto; padding: 0 20px; flex: 1; }
        .fail-card { background: white; border-radius: 12px; padding: 50px 40px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .fail-icon { font-size: 80px; margin-bottom: 20px; }
        .fail-title { font-size: 28px; font-weight: bold; color: #c62828; margin-bottom: 10px; }
        .fail-subtitle { color: #666; margin-bottom: 30px; font-size: 16px; }
        .error-box { background: #fff3f3; border-left: 4px solid #e53935; padding: 15px 20px; border-radius: 4px; margin: 20px 0; text-align: left; }
        .error-box p { color: #c62828; font-size: 14px; }
        .btn-group { display: flex; gap: 12px; margin-top: 30px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; text-decoration: none; display: inline-block; text-align: center; }
        .btn-primary { background: #1a3a6a; color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        footer { background: #1a3a6a; color: white; padding: 30px; text-align: center; margin-top: auto; }
    </style>
</head>
<body>
<header>
    <div class="header-content">
        <div class="logo">🔮 반야 쇼핑몰</div>
    </div>
</header>
<div class="container">
    <div class="fail-card">
        <div class="fail-icon">❌</div>
        <div class="fail-title">결제에 실패했습니다</div>
        <div class="fail-subtitle">결제 처리 중 문제가 발생했습니다.</div>

        <div class="error-box">
            <p>{{ message }}</p>
        </div>

        <p style="color:#666; font-size:14px; margin-top:20px;">
            문제가 계속되면 고객센터로 문의해 주세요.
        </p>

        <div class="btn-group">
            <a href="/shop/checkout" class="btn btn-primary">다시 결제하기</a>
            <a href="/shop/products" class="btn btn-secondary">쇼핑 계속하기</a>
        </div>
    </div>
</div>
<footer><p>&copy; 2024 반야 쇼핑몰</p></footer>
</body>
</html>
