{% extends "base.html" %}

{% block title %}안내 - 반야선생 사주 관리 시스템{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6 col-lg-5 text-center">
        <div class="error-container p-5 fade-in">
            <div class="error-icon mb-4">
                <i class="fas fa-exclamation-circle text-warning display-1"></i>
            </div>
            <h2 class="fw-bold text-dark mb-3">알림</h2>
            <p class="text-muted fs-5 mb-5">
                {{ msg | default("요청하신 작업을 수행할 수 없습니다.") }}<br>
                <small class="text-secondary">로그인 세션이 만료되었거나 접근 권한이 없을 수 있습니다.</small>
            </p>
            <div class="d-grid gap-3">
                <a href="/" class="btn btn-primary btn-lg shadow-sm">
                    <i class="fas fa-home me-2"></i>메인으로 돌아가기
                </a>
                <a href="/logout" class="btn btn-outline-secondary">
                    <i class="fas fa-sign-out-alt me-2"></i>다시 로그인하기
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    .error-container {
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        border: 1px solid rgba(0,0,0,0.05);
    }
    .fade-in {
        animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
