<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title|default('로그인') }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/style.css" rel="stylesheet">
  <style>
    body { background-color: var(--saju-cream); display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-container { max-width: 400px; width: 100%; }
    .top-title { color: var(--saju-navy); font-weight: bold; text-align: center; margin-bottom: 2rem; }
    .btn-login { background-color: var(--saju-navy); color: white; border-radius: 8px; }
    .btn-login:hover { background-color: #112850; color: white; }
  </style>
</head>
<body>
  <div class="login-container px-3">
    <h3 class="top-title">반야선생 사주 관리 시스템</h3>
    
    <div class="card shadow border-0" style="border-radius: 12px;">
      <div class="card-body p-4">
        {% if error %}
        <div class="alert alert-danger py-2 border-0 shadow-sm">{{ error }}</div>
        {% endif %}
        
        <form method="post" action="/login">
          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">로그인 ID</label>
            <input type="text" name="login_id" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">비밀번호</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="mb-4">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:0.875rem; color:#6c757d;">
              <input type="checkbox" name="remember" value="on" style="width:16px; height:16px; cursor:pointer;">
              로그인 상태 유지 (30일)
            </label>
          </div>
          <button type="submit" class="btn btn-login w-100 py-2 fs-5 fw-bold shadow-sm">로그인</button>
        </form>
      </div>
    </div>
    
    <div class="text-center mt-4 text-muted small">
      반야선생 사주 관리 시스템 v1.0
    </div>
  </div>
</body>
</html>
